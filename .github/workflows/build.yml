name: Build

on:
  release:
    types: [ published ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libshumate-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/wayfarer wayfarer-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfarer-linux-x86_64
          path: wayfarer-linux-x86_64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4 mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-libshumate mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Build
        shell: msys2 {0}
        run: cargo build --release

      - name: Bundle
        shell: msys2 {0}
        run: |
          mkdir -p wayfarer-bundle
          cp target/release/wayfarer.exe wayfarer-bundle/

          # Recursively collect all UCRT64 DLLs (direct + transitive deps)
          declare -A collected
          pending=("target/release/wayfarer.exe")
          while [[ ${#pending[@]} -gt 0 ]]; do
            current="${pending[0]}"
            pending=("${pending[@]:1}")
            while IFS= read -r dll; do
              name=$(basename "$dll")
              if [[ -z "${collected[$name]+x}" ]] && [[ -f "$dll" ]]; then
                collected[$name]=1
                cp "$dll" wayfarer-bundle/
                pending+=("$dll")
              fi
            done < <(ldd "$current" 2>/dev/null | grep -oP '/ucrt64/bin/\S+')
          done

          # GSettings schemas — required for map tile fetching and FileDialog
          mkdir -p wayfarer-bundle/share/glib-2.0/schemas
          cp /ucrt64/share/glib-2.0/schemas/gschemas.compiled \
             wayfarer-bundle/share/glib-2.0/schemas/

          # GDK pixbuf loaders (icons / image rendering)
          if [[ -d /ucrt64/lib/gdk-pixbuf-2.0 ]]; then
            mkdir -p wayfarer-bundle/lib
            cp -r /ucrt64/lib/gdk-pixbuf-2.0 wayfarer-bundle/lib/
          fi

          # Adwaita + hicolor icon themes
          mkdir -p wayfarer-bundle/share/icons
          cp -r /ucrt64/share/icons/hicolor wayfarer-bundle/share/icons/ 2>/dev/null || true
          cp -r /ucrt64/share/icons/Adwaita wayfarer-bundle/share/icons/ 2>/dev/null || true

      - name: Create installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" windows\installer.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfarer-windows-x86_64
          path: wayfarer-windows-x86_64-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install gtk4 libadwaita libshumate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/wayfarer wayfarer-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfarer-macos-arm64
          path: wayfarer-macos-arm64

  release:
    needs: [ build-linux, build-windows, build-macos ]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            wayfarer-linux-x86_64/wayfarer-linux-x86_64
            wayfarer-windows-x86_64/wayfarer-windows-x86_64-setup.exe
            wayfarer-macos-arm64/wayfarer-macos-arm64
