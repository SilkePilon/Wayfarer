name: Build

on:
  release:
    types: [ published ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev libshumate-dev \
            librsvg2-dev libgdk-pixbuf2.0-dev \
            fuse libfuse2 desktop-file-utils \
            imagemagick

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Build AppImage
        run: |
          # Download linuxdeploy + GTK plugin + appimagetool
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh appimagetool-x86_64.AppImage

          # Prepare AppDir
          install -Dm755 target/release/wayfarer AppDir/usr/bin/wayfarer
          install -Dm644 assets/io.github.silkepilon.Wayfarer.desktop \
            AppDir/usr/share/applications/io.github.silkepilon.Wayfarer.desktop
          install -Dm644 assets/io.github.silkepilon.Wayfarer.svg \
            "AppDir/usr/share/icons/hicolor/scalable/apps/io.github.silkepilon.Wayfarer.svg"
          # Rasterise icon for linuxdeploy (directory must exist first)
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          convert -background none assets/io.github.silkepilon.Wayfarer.svg \
            -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/io.github.silkepilon.Wayfarer.png

          # Process AppDir with GTK plugin (don't package yet)
          DEPLOY_GTK_VERSION=4 \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk

          # Remove GTK_THEME override injected by the plugin — libadwaita manages
          # its own stylesheet and respects the system color-scheme; forcing
          # GTK_THEME=Adwaita makes the app look like old GTK3 Adwaita.
          sed -i '/export GTK_THEME/d' AppDir/AppRun

          # Package into AppImage
          OUTPUT=wayfarer-linux-x86_64.AppImage \
          ./appimagetool-x86_64.AppImage AppDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfarer-linux-x86_64
          path: wayfarer-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4 mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-libshumate mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Build
        shell: msys2 {0}
        run: cargo build --release

      - name: Bundle
        shell: msys2 {0}
        run: |
          mkdir -p wayfarer-bundle
          cp target/release/wayfarer.exe wayfarer-bundle/

          # Recursively collect all UCRT64 DLLs (direct + transitive deps)
          declare -A collected
          pending=("target/release/wayfarer.exe")
          while [[ ${#pending[@]} -gt 0 ]]; do
            current="${pending[0]}"
            pending=("${pending[@]:1}")
            while IFS= read -r dll; do
              name=$(basename "$dll")
              if [[ -z "${collected[$name]+x}" ]] && [[ -f "$dll" ]]; then
                collected[$name]=1
                cp "$dll" wayfarer-bundle/
                pending+=("$dll")
              fi
            done < <(ldd "$current" 2>/dev/null | grep -oP '/ucrt64/bin/\S+')
          done

          # GSettings schemas — required for map tile fetching and FileDialog
          mkdir -p wayfarer-bundle/share/glib-2.0/schemas
          cp /ucrt64/share/glib-2.0/schemas/gschemas.compiled \
             wayfarer-bundle/share/glib-2.0/schemas/

          # GDK pixbuf loaders (icons / image rendering)
          if [[ -d /ucrt64/lib/gdk-pixbuf-2.0 ]]; then
            mkdir -p wayfarer-bundle/lib
            cp -r /ucrt64/lib/gdk-pixbuf-2.0 wayfarer-bundle/lib/
          fi

          # Adwaita + hicolor icon themes
          mkdir -p wayfarer-bundle/share/icons
          cp -r /ucrt64/share/icons/hicolor wayfarer-bundle/share/icons/ 2>/dev/null || true
          cp -r /ucrt64/share/icons/Adwaita wayfarer-bundle/share/icons/ 2>/dev/null || true

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Create installer
        shell: pwsh
        run: |
          # Set-Location ensures makensis resolves wayfarer-bundle\ relative to the repo root
          Set-Location $env:GITHUB_WORKSPACE
          & "C:\Program Files (x86)\NSIS\makensis.exe" windows\installer.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfarer-windows-x86_64
          path: wayfarer-windows-x86_64-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gtk4 libadwaita libshumate librsvg imagemagick dylibbundler create-dmg

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Build .app bundle
        run: |
          APP=Wayfarer.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Binary
          cp target/release/wayfarer "$APP/Contents/MacOS/wayfarer"

          # Info.plist
          cp macos/Info.plist "$APP/Contents/Info.plist"

          # Icon — convert SVG → icns
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512; do
            convert -background none assets/io.github.silkepilon.Wayfarer.svg \
              -resize ${size}x${size} AppIcon.iconset/icon_${size}x${size}.png
            convert -background none assets/io.github.silkepilon.Wayfarer.svg \
              -resize $((size*2))x$((size*2)) AppIcon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

          # Bundle all dylibs
          dylibbundler -od -b \
            -x "$APP/Contents/MacOS/wayfarer" \
            -d "$APP/Contents/Frameworks" \
            -p @executable_path/../Frameworks

          # GSettings schemas
          mkdir -p "$APP/Contents/Resources/share/glib-2.0/schemas"
          BREW_PREFIX=$(brew --prefix)
          cp "$BREW_PREFIX/share/glib-2.0/schemas/gschemas.compiled" \
             "$APP/Contents/Resources/share/glib-2.0/schemas/"

          # GDK pixbuf loaders
          if [[ -d "$BREW_PREFIX/lib/gdk-pixbuf-2.0" ]]; then
            cp -r "$BREW_PREFIX/lib/gdk-pixbuf-2.0" "$APP/Contents/Resources/lib/"
          fi

      - name: Package as DMG
        run: |
          create-dmg \
            --volname "Wayfarer" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Wayfarer.app" 135 175 \
            --app-drop-link 405 175 \
            --no-internet-enable \
            wayfarer-macos-arm64.dmg \
            Wayfarer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayfarer-macos-arm64
          path: wayfarer-macos-arm64.dmg

  release:
    needs: [ build-linux, build-windows, build-macos ]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            wayfarer-linux-x86_64/wayfarer-linux-x86_64.AppImage
            wayfarer-windows-x86_64/wayfarer-windows-x86_64-setup.exe
            wayfarer-macos-arm64/wayfarer-macos-arm64.dmg
