name: Build

on:
    release:
        types: [published]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    build-linux:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  sudo add-apt-repository universe -y
                  sudo apt-get update
                  sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libshumate-dev

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - name: Build
              run: cargo build --release

            - name: Package
              run: |
                  mkdir -p wayfarer-linux-x86_64
                  cp target/release/wayfarer wayfarer-linux-x86_64/
                  tar -czf wayfarer-linux-x86_64.tar.gz wayfarer-linux-x86_64

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wayfarer-linux-x86_64
                  path: wayfarer-linux-x86_64.tar.gz

    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup MSYS2
              uses: msys2/setup-msys2@v2
              with:
                  msystem: UCRT64
                  update: true
                  install: >-
                      mingw-w64-ucrt-x86_64-gtk4
                      mingw-w64-ucrt-x86_64-libadwaita
                      mingw-w64-ucrt-x86_64-libshumate
                      mingw-w64-ucrt-x86_64-rust mingw-w64-ucrt-x86_64-pkgconf

            - name: Build
              shell: msys2 {0}
              run: cargo build --release

            - name: Package
              shell: msys2 {0}
              run: |
                  mkdir -p wayfarer-windows-x86_64
                  cp target/release/wayfarer.exe wayfarer-windows-x86_64/
                  # Bundle required DLLs
                  ldd target/release/wayfarer.exe | grep ucrt64 | awk '{print $3}' | xargs -I{} cp {} wayfarer-windows-x86_64/

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wayfarer-windows-x86_64
                  path: wayfarer-windows-x86_64/

    build-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies
              run: brew install gtk4 libadwaita libshumate

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - name: Build
              run: cargo build --release

            - name: Package
              run: |
                  mkdir -p wayfarer-macos-arm64
                  cp target/release/wayfarer wayfarer-macos-arm64/
                  tar -czf wayfarer-macos-arm64.tar.gz wayfarer-macos-arm64

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wayfarer-macos-arm64
                  path: wayfarer-macos-arm64.tar.gz

    release:
        needs: [ build-linux, build-windows, build-macos ]
        runs-on: ubuntu-latest
        if: github.event_name == 'release'
        permissions:
            contents: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4

            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      wayfarer-linux-x86_64/wayfarer-linux-x86_64.tar.gz
                      wayfarer-windows-x86_64/*
                      wayfarer-macos-arm64/wayfarer-macos-arm64.tar.gz
